<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VMP — Vendor Management Platform</title>
  <link rel="stylesheet" href="assets/css/vmp.css">
</head>
<body>
  <div class="login-page" id="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-lockup">
          <img src="assets/images/winter-logo.png" alt="winter" class="brand-logo">
          <span class="brand-name">Winter Link</span>
        </div>
      </div>
      <h1>Sign in</h1>
      <p class="subtitle">Vendor Management Platform — use your company account to continue.</p>
      <form id="login-form" novalidate>
        <div class="login-field">
          <label for="login-email">Company Email</label>
          <input type="email" id="login-email" placeholder="you@company.com" autocomplete="username" value="admin@company.com">
        </div>
        <div class="login-field">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" value="demo1234">
        </div>
        <div class="login-error" id="login-error"></div>
        <button type="submit" class="btn btn-primary login-submit">Sign In</button>
      </form>
      <p class="login-note">Mock login for the wireframe — any valid company email and a non-empty password will sign you in. You can switch between roles once inside.</p>
    </div>
  </div>

  <div class="app-shell" id="app-shell" style="display:none">
    <aside class="sidebar role-taq" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-lockup">
          <img src="assets/images/winter-logo.png" alt="winter" class="brand-logo">
          <span class="brand-name">Winter Link</span>
        </div>
      </div>
      <div class="sidebar-role-label" id="sidebar-role-label">TAQ / System Admin</div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <div class="main-area">
      <header class="topbar">
        <div class="topbar-left">
          <h2>Dashboard</h2>
        </div>
        <div class="topbar-right">
          <label for="role-switcher" style="font-size:.8rem;color:var(--muted);white-space:nowrap">View as:</label>
          <select id="role-switcher" style="padding:.4rem .6rem;border-radius:6px;border:1px solid var(--border);font-size:.85rem;min-width:200px">
            <option value="taq">TAQ / System Admin</option>
            <option value="hr">HR Operations</option>
            <option value="finance">Finance</option>
            <option value="manager">Contractor's Manager</option>
            <option value="contractor">Contractor</option>
            <option value="vendor">Vendor Side Manager</option>
          </select>
          <div class="notif-wrap" id="notif-wrap">
            <button type="button" class="notif-bell" id="notif-bell" title="Notifications" aria-label="Notifications" aria-expanded="false">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 9a6 6 0 0 1 12 0c0 7 3 7 3 9H3c0-2 3-2 3-9"/>
                <path d="M10 20a2 2 0 0 0 4 0"/>
              </svg>
              <span class="notif-count" id="notif-count">5</span>
            </button>
            <div class="notif-panel" id="notif-panel" hidden>
              <div class="notif-panel-header">
                <span>Notifications</span>
                <button type="button" class="btn btn-sm btn-secondary" id="notif-mark-all">Mark all read</button>
              </div>
              <div class="notif-panel-list" id="notif-panel-list"></div>
            </div>
          </div>
          <span id="current-user-email" style="font-size:.8rem;color:var(--muted);white-space:nowrap"></span>
          <button id="logout-btn" class="btn btn-secondary btn-sm" type="button">Log out</button>
        </div>
      </header>
      <main class="content" id="screen-content"></main>
    </div>
  </div>

  <script src="assets/js/mock-data.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/screen-helpers.js"></script>
  <script src="assets/js/screens.js"></script>
  <script src="assets/js/mock-actions.js"></script>
  <script src="assets/js/router.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
